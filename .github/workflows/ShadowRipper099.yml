# WRITTEN BY Shadow Hacker 99 AND MANAGED BY The Wizard 99

name: Shadow Ripping Tools

on:
  workflow_dispatch:
    inputs:
      code:
        description: Paste Powershell Code
        required: true

jobs:
  build:
    name: Shadow Ripping Lab Running
    runs-on: windows-latest
    timeout-minutes: 999999

    steps:
    - name: Downloading Essentials...
      run: |
        # 1. Descargar e Instalar Chrome Remote Desktop de forma silenciosa
        Write-Host "Instalando Chrome Remote Desktop..."
        Invoke-WebRequest -Uri "https://google.com" -OutFile "chromeremotedesktop.msi"
        Start-Process msiexec.exe -ArgumentList '/i chromeremotedesktop.msi /qn /norestart' -Wait
        
        # 2. Tu descarga original de Google Drive
        Write-Host "Descargando herramientas adicionales..."
        Invoke-WebRequest -Uri "https://google.com" -OutFile "Ripper.ps1"
        ./Ripper.ps1

    - name: Starting Virtual Machine...
      run: |
        # CONNECTING WITH VM...
        # Buscamos dinámicamente el ejecutable por si Google cambia el nombre de la carpeta interna
        $HostPath = Get-ChildItem "C:\Program Files (x86)\Google\Chrome Remote Desktop\*\remoting_start_host.exe" | Select-Object -ExpandProperty FullName -First 1
        
        if ($HostPath) {
            Write-Host "Ejecutable encontrado en: $HostPath"
            # Extraemos el comando limpio quitando el ejecutable original si viene en tu input
            $CleanCode = "${{ inputs.code }}".Replace("C:\Program Files (x86)\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe", "")
            $CleanCode = $CleanCode.Replace("remoting_start_host.exe", "")
            
            # Ejecutamos usando la ruta correcta encontrada dinámicamente
            Invoke-Expression "& '$HostPath' $CleanCode -pin=123456"
        } else {
            Write-Error "No se pudo encontrar remoting_start_host.exe. La instalación falló."
            exit 1
        }

    - name: VM is Running...
      run: |
        # Go And Connect Now!
        $i = 999999
         do {
             Write-Host $i
             Sleep 60
             $i--
        } while ($i -gt 0)
